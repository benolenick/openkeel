# OpenKeel v0.2 — Infrastructure Operations Profile
# For managing servers, containers, services, and deployments. Allows common
# sysadmin tools; blocks destructive operations; gates service stops, container
# removal, and infrastructure-changing commands.

name: infra-ops
description: >
  Infrastructure operations profile. Allows SSH, Docker management, systemctl,
  journalctl, nginx/caddy config testing, certbot, rsync, scp, git operations,
  and Ansible playbooks. Blocks rm -rf, DROP DATABASE, disk formatting, docker
  system prune -a, and deleting systemd services. Gates docker rm/stop/kill,
  systemctl stop/disable, database migrations, firewall rule changes, DNS
  record changes, and SSL cert replacement.
version: "0.2"

# ---------------------------------------------------------------------------
# Command classification tiers
# ---------------------------------------------------------------------------

blocked:
  patterns:
    # Recursive force-deletion
    - 'rm\s+(-[a-zA-Z]*r[a-zA-Z]*f|-[a-zA-Z]*f[a-zA-Z]*r)\s+/'
    - 'rm\s+(-[a-zA-Z]*r[a-zA-Z]*f|-[a-zA-Z]*f[a-zA-Z]*r)\s+~'
    - 'rm\s+(-[a-zA-Z]*r[a-zA-Z]*f|-[a-zA-Z]*f[a-zA-Z]*r)\s+\$HOME'
    # Destructive SQL DDL
    - '(?i)\bDROP\s+(DATABASE|SCHEMA)\b'
    - '(?i)\bTRUNCATE\s+TABLE\b'
    # Disk formatting and partitioning
    - '(?i)\b(mkfs|mke2fs|mkswap)\b'
    - '(?i)\bfdisk\b'
    - '(?i)\bparted\b.*--(script|mkpart|rm)\b'
    - '(?i)\bdd\s+.*of=/dev/(sd|nvme|vd|hd)[a-z]'
    # Docker nuclear options
    - '(?i)\bdocker\s+system\s+prune\s+(-[a-zA-Z]*a|-[a-zA-Z]*-all)'
    - '(?i)\bdocker\s+volume\s+prune\s+(-[a-zA-Z]*a|-[a-zA-Z]*-all)'
    # Deleting systemd service files
    - '(?i)\brm\s+[^|&;]*/etc/systemd/system/\S+\.service'
    - '(?i)\brm\s+[^|&;]*/lib/systemd/system/\S+\.service'
    # System power control
    - '(?i)\b(shutdown|poweroff|halt|reboot|init\s+[06])\b'
    # Wipe /etc or /boot
    - 'rm\s+(-[a-zA-Z]*r[a-zA-Z]*f|-[a-zA-Z]*f[a-zA-Z]*r)\s+/etc'
    - 'rm\s+(-[a-zA-Z]*r[a-zA-Z]*f|-[a-zA-Z]*f[a-zA-Z]*r)\s+/boot'
    # Git force-push to protected branches
    - 'git\s+push\s+[^|&;]*--force[^|&;]*(main|master|production|prod|release)'
    - 'git\s+push\s+[^|&;]*-f\s+[^|&;]*(main|master|production|prod|release)'
  message: "BLOCKED by infra-ops profile: destructive or irreversible infrastructure operation denied."

gated:
  patterns:
    # Docker container removal and stop
    - '(?i)\bdocker\s+(rm|stop|kill)\s'
    - '(?i)\bdocker[\s-]compose\s+(down|rm|stop|kill)\b'
    - '(?i)\bdocker\s+compose\s+(down|rm|stop|kill)\b'
    # systemctl stop/disable (service disruption)
    - '(?i)\bsystemctl\s+(stop|disable|mask|kill)\b'
    # Database migrations
    - '(?i)\b(alembic|flyway|liquibase|migrate|django-admin)\s+[^|&;]*(migrate|upgrade|downgrade)\b'
    - '(?i)\bprisma\s+migrate\b'
    - '(?i)\bknex\s+migrate\b'
    # SQL schema changes
    - '(?i)\bCREATE\s+(TABLE|DATABASE|SCHEMA)\b'
    - '(?i)\bALTER\s+(TABLE|DATABASE|SCHEMA)\b'
    - '(?i)\bDROP\s+(TABLE|INDEX|VIEW)\b'
    # Firewall rule changes
    - '(?i)\b(iptables|nftables|nft|ufw)\s+(-A|-D|-I|-F|-X|-P|add|delete|insert|flush|allow|deny|reject)\b'
    - '(?i)\bfirewall-cmd\s'
    # DNS record changes
    - '(?i)\b(aws\s+route53|gcloud\s+dns|az\s+network\s+dns)\s'
    - '(?i)\bnsupdate\b'
    # SSL cert replacement
    - '(?i)\bcertbot\s+(certonly|renew|delete)\b'
    - '(?i)\bcp\s+[^|&;]*\.(pem|crt|key)\s+/etc/(ssl|nginx|caddy|letsencrypt)/'
    # Docker image push
    - '(?i)\bdocker\s+(push|buildx\s+build[^|&;]*--push)\b'
    # Package management (production installs)
    - '(?i)\b(apt|apt-get|yum|dnf)\s+(install|remove|purge|autoremove)\b'
    # Credential env exports
    - '(?i)\bexport\s+\w*(SECRET|TOKEN|KEY|PASSWORD|PASS|API_KEY)\w*='
  message: "GATED by infra-ops profile: service disruption, migration, or infrastructure change requires approval."

safe:
  patterns:
    # SSH and remote operations
    - '\bssh\s+\S'
    - '\bscp\s+'
    - '\brsync\s+'
    - '\bsftp\s+'
    # Docker read-only and management
    - '^\s*docker\s+(ps|images|inspect|logs|stats|version|info|events|diff|top|port)\b'
    - '^\s*docker\s+(build|pull|tag|create|run|exec|cp)\b'
    - '^\s*docker\s+network\s+(ls|inspect|create)\b'
    - '^\s*docker\s+volume\s+(ls|inspect|create)\b'
    - '^\s*docker[\s-]compose\s+(ps|logs|top|config|build|up|pull|exec)\b'
    - '^\s*docker\s+compose\s+(ps|logs|top|config|build|up|pull|exec)\b'
    # systemctl (status, start, restart — not stop/disable)
    - '^\s*systemctl\s+(status|is-active|is-enabled|list-units|list-timers|show|start|restart|reload|enable|daemon-reload)\b'
    # journalctl (log reading)
    - '^\s*journalctl\b'
    # Nginx / Caddy config testing
    - '^\s*nginx\s+-t\b'
    - '^\s*nginx\s+-T\b'
    - '^\s*caddy\s+(validate|adapt|fmt)\b'
    # Certbot (list/status only — renew/certonly is gated)
    - '^\s*certbot\s+certificates\b'
    # Git operations
    - '^\s*git\s+(status|diff|log|show|branch|tag|remote|fetch|stash|describe|blame|ls-files|reflog)\b'
    - '^\s*git\s+(add|commit|checkout|switch|restore|merge|rebase|pull|clone|push)\b'
    # Ansible
    - '^\s*ansible-playbook\s'
    - '^\s*ansible\s'
    - '^\s*ansible-galaxy\s'
    # File system operations
    - '^\s*(ls|ll|la|dir|find|fd)\b'
    - '^\s*(cat|less|head|tail|grep|rg|awk|sed|wc|sort|uniq|cut|diff|jq)\s'
    - '^\s*(cp|mv|mkdir|touch|ln)\s'
    - '^\s*pwd\s*$'
    - '^\s*cd\s'
    # Text editors
    - '^\s*(vim|nvim|nano|code|cursor)\s'
    # Python / Node execution
    - '^\s*(python|python3)\s'
    - '^\s*(node|npm|npx|yarn|pnpm)\s'
    # Process and system info
    - '^\s*(ps|top|htop|free|df|du|uname|id|whoami|hostname|uptime|date)\b'
    - '^\s*(netstat|ss|lsof|ip)\s'
    - '^\s*(ping|traceroute|dig|nslookup|host|curl|wget)\s'
    # Environment introspection
    - '^\s*(env|printenv|echo|which|type|whereis)\b'
    # Tar and compression
    - '^\s*(tar|gzip|gunzip|bzip2|xz|zip|unzip)\s'
    # Service and daemon inspection
    - '^\s*service\s+\S+\s+status\b'
  message: ""

default_action: allow

# ---------------------------------------------------------------------------
# Scope constraints
# ---------------------------------------------------------------------------

scope:
  allowed_ips: []
  allowed_hostnames: []
  allowed_paths:
    - "/home/**"
    - "/opt/**"
    - "/srv/**"
    - "/var/log/**"
    - "/tmp/**"
    - "/var/tmp/**"
    - "C:/Users/**"
  denied_paths:
    - "/etc/shadow"
    - "/etc/gshadow"
    - "/etc/sudoers"
    - "/boot/**"

# ---------------------------------------------------------------------------
# Activities (timeboxing)
# ---------------------------------------------------------------------------

activities:
  - name: deployment
    patterns:
      - '^\s*docker[\s-]compose\s+(up|build|pull)\b'
      - '^\s*docker\s+compose\s+(up|build|pull)\b'
      - '^\s*ansible-playbook\s'
      - '^\s*git\s+pull\b'
      - '^\s*rsync\s'
    timebox_minutes: 30
    grace_minutes: 5

  - name: debugging
    patterns:
      - '^\s*journalctl\b'
      - '^\s*docker\s+(logs|inspect|exec)\b'
      - '^\s*systemctl\s+(status|show)\b'
      - '^\s*(netstat|ss|lsof|curl|ping)\s'
    timebox_minutes: 30
    grace_minutes: 5

  - name: maintenance
    patterns:
      - '^\s*systemctl\s+(start|restart|reload|enable)\b'
      - '^\s*nginx\s+-t\b'
      - '^\s*certbot\b'
      - '^\s*(cp|mv|mkdir|ln)\s'
    timebox_minutes: 20
    grace_minutes: 5

# ---------------------------------------------------------------------------
# Phases
# ---------------------------------------------------------------------------

phases:
  - name: assess
    description: "Review current state of infrastructure — logs, service health, disk usage."
    timeout_minutes: 15
    auto_advance: false
    gates: []

  - name: plan
    description: "Plan changes — config edits, migrations, deployments."
    timeout_minutes: 10
    auto_advance: false
    gates: []

  - name: execute
    description: "Apply planned infrastructure changes."
    timeout_minutes: 30
    auto_advance: false
    gates: []

  - name: verify
    description: "Verify changes — health checks, log inspection, connectivity tests."
    timeout_minutes: 15
    auto_advance: false
    gates: []

# ---------------------------------------------------------------------------
# Re-injection
# ---------------------------------------------------------------------------

reinjection:
  capsule_every: 20
  full_every: 120
  rules_path: ""
  capsule_lines: 20

# ---------------------------------------------------------------------------
# Sandbox
# ---------------------------------------------------------------------------

sandbox:
  enabled: false
  memory_max: ""
  cpu_quota: ""
  network_deny: []
  readonly_paths: []
  inaccessible_paths: []

# ---------------------------------------------------------------------------
# Learning (cross-session memory)
# ---------------------------------------------------------------------------

learning:
  enabled: false
  endpoint: "http://127.0.0.1:8000"
  timeout: 15
  extract_on:
    - timebox_blocks
    - drift_events
    - blocked_commands
  auto_seed: true
  search_top_k: 5

# ---------------------------------------------------------------------------
# Tags
# ---------------------------------------------------------------------------

tags:
  - infra
  - devops
